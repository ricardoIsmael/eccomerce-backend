spring:
  application:
    name: product-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      # Sintaxis: ${NOMBRE_VAR_ENTORNO : VALOR_POR_DEFECTO}
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27018}
      database: ${MONGO_DATABASE:product-db}
      username: ${MONGO_USERNAME}
      password: ${MONGO_PASSWORD}
      authentication-database: ${MONGO_AUTH_DB:admin}

server:
  port: 8080
  error:
    include-message: always #configurar que se aplica y que siempre este en el json sin importar si el error lo generamos nostros o el frontend
    include-stacktrace: never #prohibe que se vea la traza de la pila en la resp json
